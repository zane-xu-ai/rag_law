<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>RAG 法律问答</title>
  <style>
    /* CSS Variables for theming */
    :root {
      --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
    }

    /* Dark theme (default) */
    :root[data-theme="dark"] {
      --bg: #0f172a;
      --bg-elevated: #1e293b;
      --bg-card: #1e293b;
      --bg-input: #334155;
      --text: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #10b981;
      --accent-hover: #059669;
      --accent-light: rgba(16, 185, 129, 0.1);
      --border: #334155;
      --border-light: #475569;
      --error: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --info: #3b82f6;
      --gradient-start: #1e293b;
      --gradient-end: #0f172a;
      --shadow-color: rgba(0, 0, 0, 0.3);
    }

    /* Light theme */
    :root[data-theme="light"] {
      --bg: #f8fafc;
      --bg-elevated: #ffffff;
      --bg-card: #ffffff;
      --bg-input: #f1f5f9;
      --text: #1e293b;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --accent: #10b981;
      --accent-hover: #059669;
      --accent-light: rgba(16, 185, 129, 0.1);
      --border: #e2e8f0;
      --border-light: #cbd5e1;
      --error: #dc2626;
      --success: #16a34a;
      --warning: #d97706;
      --info: #2563eb;
      --gradient-start: #ffffff;
      --gradient-end: #f8fafc;
      --shadow-color: rgba(0, 0, 0, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      transition: background-color var(--transition), color var(--transition);
      background-image: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
      background-attachment: fixed;
    }

    /* Header */
    .header {
      padding: 1.5rem 1rem;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      box-shadow: var(--shadow);
    }

    .logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(135deg, var(--text), var(--text-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo .subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Theme toggle */
    .theme-toggle {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      transition: all var(--transition);
      box-shadow: var(--shadow-sm);
    }

    .theme-toggle:hover {
      border-color: var(--border-light);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .theme-option {
      padding: 0.375rem 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }

    .theme-option.active {
      background: var(--accent);
      color: white;
      box-shadow: var(--shadow-sm);
    }

    .theme-option:not(.active) {
      color: var(--text-secondary);
    }

    .theme-option:not(.active):hover {
      color: var(--text);
      background: var(--accent-light);
    }

    /* Main content */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem 2rem;
    }

    /* Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      transition: all var(--transition);
    }

    .card:hover {
      box-shadow: var(--shadow-lg);
      border-color: var(--border-light);
    }

    .card-title {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Input section */
    .input-section {
      position: relative;
    }

    .input-wrapper {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 1rem 1rem 2.5rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-input);
      color: var(--text);
      font-size: 1rem;
      line-height: 1.6;
      resize: vertical;
      transition: all var(--transition);
      font-family: var(--font-sans);
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    .input-hint {
      position: absolute;
      bottom: 0.75rem;
      right: 1rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Controls */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-top: 1rem;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .control-group label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Model selector styles */
    .model-selector {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .model-select {
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.9375rem;
      padding: 0.625rem 0.875rem;
      min-width: 140px;
      cursor: pointer;
      transition: border-color var(--transition);
    }

    .model-select:hover {
      border-color: var(--accent);
    }

    .model-select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-light);
    }

    .model-select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .model-select option {
      background: var(--bg-card);
      color: var(--text);
    }

    input[type="number"] {
      width: 6rem;
      padding: 0.625rem 0.875rem;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-input);
      color: var(--text);
      font-size: 0.9375rem;
      font-weight: 500;
      transition: all var(--transition);
    }

    input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    /* Button */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-left: auto;
    }

    .btn-primary {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: white;
      font-weight: 600;
      font-size: 0.9375rem;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: var(--shadow);
    }

    .btn-stop {
      padding: 0.75rem 1.25rem;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-input);
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.9375rem;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-stop:hover:not(:disabled) {
      border-color: var(--error);
      color: var(--error);
      background: rgba(239, 68, 68, 0.08);
    }

    .btn-stop:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .answer-stopped {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px dashed var(--border);
      color: var(--text-muted);
      font-size: 0.875rem;
      font-style: italic;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
      filter: brightness(1.1);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary.spinning::after {
      content: "";
      width: 16px;
      height: 16px;
      border: 2px solid transparent;
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Metrics */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .metric-card {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
      text-align: center;
      transition: all var(--transition);
    }

    .metric-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .metric-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .metric-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      font-family: var(--font-mono);
    }

    .metric-unit {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-left: 0.25rem;
    }

    /* Phases */
    .phases-container {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      line-height: 1.8;
      max-height: 300px;
      overflow-y: auto;
      padding: 1rem;
      background: var(--bg-input);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .phase-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }

    .phase-item:last-child {
      border-bottom: none;
    }

    .phase-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .phase-status.pending { background: var(--warning); }
    .phase-status.done { background: var(--success); }
    .phase-status.cached { background: var(--info); }

    .phase-name {
      flex: 1;
      font-weight: 500;
    }

    .phase-time {
      color: var(--text-muted);
      font-size: 0.8125rem;
    }

    .phase-badge {
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      background: var(--accent-light);
      color: var(--accent);
    }

    /* Retrieval */
    .retrieval-container {
      max-height: 400px;
      overflow-y: auto;
    }

    .retrieval-item {
      padding: 1rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 0.75rem;
      transition: all var(--transition);
    }

    .retrieval-item:hover {
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .retrieval-item:last-child {
      margin-bottom: 0;
    }

    .retrieval-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .retrieval-index {
      font-weight: 700;
      color: var(--accent);
      font-size: 0.875rem;
    }

    .retrieval-score {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .retrieval-content {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .retrieval-meta {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    /* Answer */
    .answer-container {
      min-height: 120px;
      padding: 1.25rem;
      background: var(--bg-input);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      font-size: 1rem;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .answer-container.streaming {
      border-color: var(--accent);
      animation: pulse-border 2s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { border-color: var(--accent); }
      50% { border-color: var(--border); }
    }

    .answer-placeholder {
      color: var(--text-muted);
      font-style: italic;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      opacity: 0.5;
    }

    /* Error */
    .error-banner {
      display: none;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--error);
      border-radius: var(--radius-sm);
      color: var(--error);
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }

    .error-banner.show {
      display: flex;
    }

    .error-banner::before {
      content: "⚠️";
      font-size: 1rem;
    }

    /* Two column layout for results */
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 900px) {
      .results-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Mobile responsive */
    @media (max-width: 640px) {
      .header {
        padding: 1rem;
      }

      .logo h1 {
        font-size: 1.25rem;
      }

      .container {
        padding: 0 0.75rem 1.5rem;
      }

      .card {
        padding: 1rem;
      }

      textarea {
        min-height: 100px;
        padding: 0.875rem 0.875rem 2rem;
      }

      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      .control-group {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }

      input[type="number"] {
        width: 5rem;
      }

      .btn-group {
        width: 100%;
        margin-left: 0;
        flex-direction: column;
      }

      .btn-primary,
      .btn-stop {
        width: 100%;
        justify-content: center;
      }

      .metrics-grid {
        grid-template-columns: 1fr;
      }

      .phases-container {
        font-size: 0.8125rem;
      }

      .phase-item {
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .phase-time {
        width: 100%;
        padding-left: 1.25rem;
      }

      .retrieval-item {
        padding: 0.875rem;
      }

      .answer-container {
        padding: 1rem;
        font-size: 0.9375rem;
      }
    }

    /* Touch-friendly */
    @media (hover: none) {
      .card:hover,
      .metric-card:hover,
      .retrieval-item:hover {
        transform: none;
      }

      textarea:focus,
      input[type="number"]:focus {
        font-size: 16px; /* Prevent zoom on iOS */
      }
    }

    /* Print styles */
    @media print {
      body {
        background: white;
        color: black;
      }

      .header,
      .theme-toggle,
      .btn-primary,
      .btn-stop {
        display: none;
      }

      .card {
        border: 1px solid #ccc;
        box-shadow: none;
      }
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-input);
      border-radius: var(--radius-sm);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: var(--radius-sm);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* Loading shimmer for streaming text */
    .streaming-cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: var(--accent);
      margin-left: 2px;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Focus visible for accessibility */
    *:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
      <div class="logo-icon">⚖️</div>
      <div>
        <h1>RAG 法律问答</h1>
        <div class="subtitle">基于 Elasticsearch 的检索增强生成</div>
      </div>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
      <span class="theme-option" data-value="light">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        亮色
      </span>
      <span class="theme-option active" data-value="dark">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        暗色
      </span>
    </button>
  </header>

  <main class="container">
    <div class="error-banner" id="err"></div>

    <div class="card input-section">
      <div class="card-title">
        <span>📝</span> 输入问题
      </div>
      <div class="input-wrapper">
        <textarea id="q" placeholder="输入你的法律相关问题，例如：民法典中关于合同效力的规定有哪些？"></textarea>
        <div class="input-hint">支持多行输入</div>
      </div>
      <div class="controls">
        <div class="control-group">
          <label for="k">检索数量 k</label>
          <input type="number" id="k" min="1" max="20" placeholder="默认" />
        </div>
        <div class="control-group">
          <label>选择模型</label>
          <div class="model-selector">
            <select id="provider" class="model-select">
              <option value="">-- 供应商 --</option>
            </select>
            <select id="model" class="model-select" disabled>
              <option value="">-- 模型 --</option>
            </select>
          </div>
        </div>
        <div class="btn-group">
          <button type="button" id="go" class="btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            提交提问
          </button>
          <button type="button" id="stop" class="btn-stop" hidden disabled aria-label="终止大模型输出">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" rx="1"></rect>
            </svg>
            停止输出
          </button>
        </div>
      </div>
    </div>

    <div class="card" id="metricsCard" style="display: none;">
      <div class="card-title">
        <span>⏱️</span> 性能指标
      </div>
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">首字延迟 (TTFT)</div>
          <div class="metric-value">
            <span id="ttft">—</span><span class="metric-unit">ms</span>
          </div>
        </div>
        <div class="metric-card">
          <div class="metric-label">RAG 预填耗时</div>
          <div class="metric-value">
            <span id="ragpre">—</span><span class="metric-unit">ms</span>
          </div>
        </div>
        <div class="metric-card">
          <div class="metric-label">全程总耗时</div>
          <div class="metric-value">
            <span id="total">—</span><span class="metric-unit">ms</span>
          </div>
        </div>
      </div>
    </div>

    <div class="results-grid">
      <div class="card">
        <div class="card-title">
          <span>⚡</span> 阶段耗时
        </div>
        <div class="phases-container" id="phases">
          <div class="empty-state">
            <div class="empty-state-icon">⏳</div>
            <div>等待提问开始...</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <span>🔍</span> 检索结果
          <span id="hitCount" style="margin-left: auto; color: var(--accent);"></span>
        </div>
        <div class="retrieval-container" id="retrieval">
          <div class="empty-state">
            <div class="empty-state-icon">📄</div>
            <div>等待检索完成...</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>💬</span> 回答
      </div>
      <div class="answer-container" id="answer">
        <div class="answer-placeholder">答案将在此处流式显示...</div>
      </div>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    // Theme management
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    // Initialize theme from localStorage or system preference
    function initTheme() {
      const saved = localStorage.getItem('qa-theme');
      if (saved) {
        setTheme(saved);
      } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
        setTheme('light');
      }
    }

    function setTheme(theme) {
      html.setAttribute('data-theme', theme);
      document.querySelectorAll('.theme-option').forEach(opt => {
        opt.classList.toggle('active', opt.dataset.value === theme);
      });
      localStorage.setItem('qa-theme', theme);
    }

    themeToggle.addEventListener('click', (e) => {
      const target = e.target.closest('.theme-option');
      if (!target) return;
      setTheme(target.dataset.value);
    });

    // Model selector management
    let modelData = null;
    const providerSelect = $('provider');
    const modelSelect = $('model');

    async function loadModels() {
      try {
        const res = await fetch('/api/models');
        if (!res.ok) throw new Error('Failed to load models');
        modelData = await res.json();
        populateProviders();
      } catch (e) {
        console.warn('Failed to load model list:', e);
        // 下拉加载失败时不影响提问：回退服务端默认模型（不传 model 字段）
        providerSelect.innerHTML = '<option value="">-- 默认模型 --</option>';
        modelSelect.innerHTML = '<option value="">-- 使用配置默认模型 --</option>';
        providerSelect.disabled = true;
        modelSelect.disabled = true;
      }
    }

    function populateProviders() {
      if (!modelData || !modelData.rankedModels) return;
      const providers = Object.keys(modelData.rankedModels);
      providerSelect.innerHTML = '<option value="">-- 供应商 --</option>';
      providers.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        providerSelect.appendChild(opt);
      });
    }

    function populateModels(provider) {
      modelSelect.innerHTML = '<option value="">-- 模型 --</option>';
      if (!provider || !modelData || !modelData.rankedModels[provider]) {
        modelSelect.disabled = true;
        return;
      }
      const models = modelData.rankedModels[provider];
      models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        modelSelect.appendChild(opt);
      });
      modelSelect.disabled = false;
    }

    providerSelect.addEventListener('change', (e) => {
      populateModels(e.target.value);
    });

    // Load models on init
    loadModels();

    // Listen for system theme changes
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => {
      if (!localStorage.getItem('qa-theme')) {
        setTheme(e.matches ? 'light' : 'dark');
      }
    });

    initTheme();

    // QA functionality

    const phasesEl = $("phases");
    const retrievalEl = $("retrieval");
    const answerEl = $("answer");
    const errEl = $("err");
    const metricsCard = $("metricsCard");
    const hitCountEl = $("hitCount");

    let streamAbortController = null;

    function setStopStreamingUi(active) {
      const stopBtn = $("stop");
      stopBtn.hidden = !active;
      stopBtn.disabled = !active;
    }

    function isAbortError(e) {
      return (
        e &&
        (e.name === "AbortError" ||
          (e.cause && e.cause.name === "AbortError"))
      );
    }

    function createPhaseItem(name, time, offset, isCached = false) {
      const div = document.createElement('div');
      div.className = 'phase-item';
      div.innerHTML = `
        <div class="phase-status ${isCached ? 'cached' : 'done'}"></div>
        <div class="phase-name">${name}</div>
        ${isCached ? '<span class="phase-badge">缓存</span>' : ''}
        <div class="phase-time">${time} ms <span style="color: var(--text-muted)">(offset ${offset} ms)</span></div>
      `;
      return div;
    }

    /** SSE `retrieval` 事件里每条命中为后端摘要：preview、score、source_file、chunk_index（见 qa/streaming.py）。 */
    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function createRetrievalItem(index, hit) {
      const rawScore = hit.score ?? hit._score;
      const num = typeof rawScore === 'number' ? rawScore : parseFloat(rawScore);
      const scoreLabel = Number.isFinite(num) ? num.toFixed(3) : '—';
      const body =
        hit.preview ??
        hit.text ??
        (hit._source && (hit._source.text || hit._source.content)) ??
        '';
      const metaBits = [];
      if (hit.source_file != null && String(hit.source_file).trim() !== '') {
        metaBits.push('文件: ' + hit.source_file);
      }
      if (hit.chunk_index != null) {
        metaBits.push('块: ' + hit.chunk_index);
      }
      if (hit._source && hit._source.metadata != null) {
        metaBits.push(JSON.stringify(hit._source.metadata));
      }
      const metaHtml = metaBits.length
        ? `<div class="retrieval-meta">${escapeHtml(metaBits.join(' · '))}</div>`
        : '';

      const div = document.createElement('div');
      div.className = 'retrieval-item';
      div.innerHTML = `
        <div class="retrieval-header">
          <span class="retrieval-index">#${index + 1}</span>
          <span class="retrieval-score">score: ${escapeHtml(scoreLabel)}</span>
        </div>
        <div class="retrieval-content">${body ? escapeHtml(body) : '<span class="answer-placeholder">(无内容)</span>'}</div>
        ${metaHtml}
      `;
      return div;
    }

    async function run() {
      const query = $("q").value.trim();
      if (!query) {
        errEl.textContent = "请输入问题";
        errEl.classList.add('show');
        return;
      }
      errEl.textContent = "";
      errEl.classList.remove('show');

      const goBtn = $("go");
      goBtn.disabled = true;
      goBtn.classList.add('spinning');
      goBtn.innerHTML = `<span>处理中...</span>`;

      streamAbortController = new AbortController();
      setStopStreamingUi(true);

      // Reset UI
      phasesEl.innerHTML = '';
      retrievalEl.innerHTML = '';
      answerEl.innerHTML = '';
      answerEl.classList.add('streaming');
      metricsCard.style.display = 'none';
      hitCountEl.textContent = '';

      const body = { query };
      const kVal = $("k").value.trim();
      if (kVal) body.k = parseInt(kVal, 10);
      const modelVal = $("model").value;
      if (modelVal) body.model = modelVal;

      try {
        const res = await fetch("/api/qa/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json", Accept: "text/event-stream" },
          body: JSON.stringify(body),
          signal: streamAbortController.signal,
        });
        if (!res.ok) {
          const t = await res.text();
          throw new Error(res.status + " " + t);
        }
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const parts = buf.split("\n");
          buf = parts.pop() || "";
          for (const line of parts) {
            if (!line.startsWith("data:")) continue;
            const jsonStr = line.slice(5).trim();
            if (!jsonStr) continue;
            let ev;
            try {
              ev = JSON.parse(jsonStr);
            } catch {
              continue;
            }
            if (ev.type === "phase") {
              // 不展示耗时 < 10ms 的阶段（如 settings_resolve、build_messages、缓存 0ms）
              const phaseMs = Number(ev.elapsed_ms);
              if (Number.isFinite(phaseMs) && phaseMs < 10) continue;
              const phaseDiv = createPhaseItem(
                ev.phase,
                ev.elapsed_ms,
                ev.offset_ms,
                ev.cached
              );
              phasesEl.appendChild(phaseDiv);
              phasesEl.scrollTop = phasesEl.scrollHeight;
            } else if (ev.type === "retrieval") {
              hitCountEl.textContent = `命中 ${ev.hit_count} 条`;
              retrievalEl.innerHTML = '';
              (ev.hits || []).forEach((hit, idx) => {
                retrievalEl.appendChild(createRetrievalItem(idx, hit));
              });
            } else if (ev.type === "delta") {
              // Remove placeholder on first content
              if (answerEl.querySelector('.answer-placeholder')) {
                answerEl.innerHTML = '';
              }
              answerEl.textContent += ev.content;
            } else if (ev.type === "metrics") {
              metricsCard.style.display = 'block';
              $("ttft").textContent = String(ev.ttft_ms);
              $("ragpre").textContent = String(ev.rag_prefill_ms);
            } else if (ev.type === "done") {
              metricsCard.style.display = 'block';
              if (ev.ttft_ms != null) $("ttft").textContent = String(ev.ttft_ms);
              $("total").textContent = String(ev.total_ms);
              $("ragpre").textContent = String(ev.rag_prefill_ms);
              answerEl.classList.remove('streaming');
            } else if (ev.type === "error") {
              errEl.textContent = ev.message || "error";
              errEl.classList.add('show');
            }
          }
        }
      } catch (e) {
        if (isAbortError(e)) {
          answerEl.classList.remove('streaming');
          const plain = answerEl.textContent.trim();
          const hasStoppedMark = answerEl.querySelector(".answer-stopped");
          if (!plain || answerEl.querySelector(".answer-placeholder")) {
            answerEl.innerHTML =
              '<div class="answer-placeholder">已停止，尚无生成内容。</div>';
          } else if (!hasStoppedMark) {
            const mark = document.createElement("div");
            mark.className = "answer-stopped";
            mark.textContent = "输出已停止（连接已中断）";
            answerEl.appendChild(mark);
          }
        } else {
          errEl.textContent = String(e.message || e);
          errEl.classList.add('show');
          answerEl.classList.remove('streaming');
        }
      } finally {
        streamAbortController = null;
        setStopStreamingUi(false);
        goBtn.disabled = false;
        goBtn.classList.remove('spinning');
        goBtn.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          提交提问
        `;
      }
    }

    $("go").addEventListener("click", run);

    $("stop").addEventListener("click", () => {
      if (streamAbortController) {
        streamAbortController.abort();
      }
    });

    // Enter to submit (Ctrl+Enter or Cmd+Enter)
    $("q").addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        run();
      }
    });
  </script>
</body>
</html>
