# 本地开发用 Elasticsearch 单节点（非生产）。
# 用法：docker compose -f doc/storage/docker-compose.elasticsearch.yml up -d
#
# 浏览器 / 客户端：http://localhost:9200
# ES 9.x 默认可能开启安全；本示例为便于联调关闭安全（仅本机）。

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.2
    container_name: rag_law_es93
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - rag_law_es_data:/usr/share/elasticsearch/data

volumes:
  rag_law_es_data:
